<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weapons - 7DS Origin</title>
</head>
<body>

<h2>Weapons Page (Fixed)</h2>

<div id="weaponCount">Loading...</div>
<input id="weaponSearch" placeholder="Search weapon">
<div id="weaponsList"></div>

<script>
(function(){

'use strict';

var allWeapons=[];
var filters={search:''};

var $list=document.getElementById('weaponsList');
var $search=document.getElementById('weaponSearch');
var $count=document.getElementById('weaponCount');

document.addEventListener('DOMContentLoaded',async function(){

await loadAllData();
renderWeapons();

$search.addEventListener('input',function(){
filters.search=this.value.toLowerCase();
renderWeapons();
});

}); // FIXED closing DOMContentLoaded

async function loadAllData(){
allWeapons=[
{name_en:"Example Sword",equipment_atk:120},
{name_en:"Example Axe",equipment_atk:150}
];
}

function getFilteredWeapons(){
return allWeapons.filter(function(w){
var name=(w.name_en||'').toLowerCase();
if(filters.search && name.indexOf(filters.search)===-1) return false;
return true;
});
}

function renderWeapons(){

var weapons=getFilteredWeapons();

$count.textContent="Showing "+weapons.length+" weapons";

if(weapons.length===0){
$list.innerHTML="No weapons";
return;
}

var html='';

weapons.forEach(function(w){
html+='<div>'+w.name_en+' - ATK '+w.equipment_atk+'</div>';
});

$list.innerHTML=html;

}

})();
</script>

</body>
</html>
